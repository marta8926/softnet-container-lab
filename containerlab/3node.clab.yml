name: 3node-lab

topology:
  defaults:
    kind: linux
    image: clab-ubuntu-softnet:latest

  nodes:
    hs1:
      binds:
        - configs/hs1.cfg:/etc/nodes/hs1.cfg:ro
        - bin/entrypoint.sh:/entrypoint.sh:ro
      exec:
        - bash /entrypoint.sh
        - ip route replace default via 10.0.1.1

    rt1:
      binds:
        - configs/rt1.cfg:/etc/nodes/rt1.cfg:ro
        - bin/entrypoint.sh:/entrypoint.sh:ro
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - sysctl -w net.ipv6.conf.all.forwarding=1
        - bash /entrypoint.sh
        - ip addr add 10.0.2.1/24 dev eth2
        - ip -6 addr add fd00:2::1/64 dev eth2

    hs2:
      binds:
        - configs/hs2.cfg:/etc/nodes/hs2.cfg:ro
        - bin/entrypoint.sh:/entrypoint.sh:ro
      exec:
        - bash /entrypoint.sh
        - ip route replace default via 10.0.2.1

  links:
    - endpoints: ["hs1:eth1", "rt1:eth1"]
    - endpoints: ["hs2:eth1", "rt1:eth2"]
